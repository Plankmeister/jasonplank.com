<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Jason Plank</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230A0A0A'/%3E%3Ctext x='32' y='43' font-family='system-ui,-apple-system,sans-serif' font-weight='700' font-size='30' fill='%23FB4F14' text-anchor='middle'%3EJP%3C/text%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --accent: #FB4F14;
            --accent-light: #FF6B35;
            --accent-rgb: 251, 79, 20;
            --black: #0A0A0A;
            --gray: #888;
            --gray-light: #BBB;
            --white: #F5F5F5;
            --white-pure: #FFFFFF;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--black);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
            overflow: hidden;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 500px;
        }

        .error-code {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(6rem, 20vw, 10rem);
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 16px;
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 12px;
        }

        p {
            color: var(--gray-light);
            font-size: 1.05rem;
            margin-bottom: 32px;
            line-height: 1.6;
        }

        .home-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--accent);
            color: var(--white-pure);
            font-weight: 600;
            font-size: 1rem;
            padding: 14px 32px;
            border-radius: 8px;
            text-decoration: none;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .home-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(var(--accent-rgb), 0.3);
        }

        .glow {
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(var(--accent-rgb), 0.15) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .glow-1 { top: -20%; right: -10%; }
        .glow-2 { bottom: -20%; left: -10%; opacity: 0.5; }
    </style>
</head>
<body>
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>
    <div class="container">
        <div class="error-code">404</div>
        <h1>Page not found</h1>
        <p>Looks like this page doesn't exist. Maybe it moved, maybe it never was. Either way, let's get you back on track.</p>
        <a href="/" class="home-link">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            Back to Home
        </a>
    </div>
</body>
</html>
