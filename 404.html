<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Jason Plank</title>
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/svg+xml" id="favicon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%23171410'/%3E%3Ctext x='32' y='44' font-family='system-ui,-apple-system,sans-serif' font-weight='700' font-size='30' fill='%23FF4B11' text-anchor='middle'%3EJP%3C/text%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@62..125,100..900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --paper: #F4F0E6;
            --paper-rgb: 244, 240, 230;
            --ink: #171410;
            --ink-rgb: 23, 20, 16;
            --accent: #FF4B11;
            --on-accent: #171410;
            --line: rgba(var(--ink-rgb), 0.16);
            --font-mono: 'Space Mono', 'Courier New', monospace;
        }

        body {
            font-family: 'Archivo', 'Helvetica Neue', Arial, sans-serif;
            background: var(--paper);
            color: var(--ink);
            min-height: 100svh;
            display: flex;
            flex-direction: column;
        }

        ::selection { background: var(--accent); color: var(--on-accent); }

        .mono {
            font-family: var(--font-mono);
            font-size: 0.72rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        header {
            border-bottom: 1px solid var(--ink);
            padding: 0 clamp(20px, 4vw, 56px);
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-weight: 800;
            font-stretch: 110%;
            font-size: 1rem;
            letter-spacing: 0.02em;
            text-transform: uppercase;
            text-decoration: none;
            color: inherit;
        }
        .logo .dot { color: var(--accent); }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: clamp(28px, 5vw, 72px) clamp(20px, 4vw, 56px);
            max-width: 1440px;
            width: 100%;
            margin: 0 auto;
        }

        .code-row { border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); }

        h1 {
            font-size: clamp(6rem, 27vw, 24rem);
            font-weight: 800;
            font-stretch: 125%;
            letter-spacing: -0.02em;
            line-height: 0.85;
            text-transform: uppercase;
        }
        h1 span:last-child {
            color: transparent;
            -webkit-text-stroke: 2.5px var(--ink);
        }

        .quip {
            font-family: var(--font-mono);
            font-size: 0.78rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--accent);
            margin: 18px 0 8px;
        }
        .quip::before { content: '✱ '; }

        .sub { max-width: 52ch; font-size: 1.05rem; line-height: 1.65; margin-bottom: 32px; }

        .row { display: flex; gap: 14px; flex-wrap: wrap; }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 15px 26px;
            font-family: var(--font-mono);
            font-size: 0.76rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            text-decoration: none;
            color: inherit;
            border: 1px solid var(--ink);
            transition: transform 0.25s cubic-bezier(0.19, 1, 0.22, 1), box-shadow 0.25s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .btn-solid { background: var(--accent); color: var(--on-accent); }
        .btn:hover { transform: translate(-3px, -3px); box-shadow: 4px 4px 0 var(--ink); }

        footer {
            border-top: 1px solid var(--ink);
            padding: 12px clamp(20px, 4vw, 56px);
            display: flex;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { transition-duration: 0.01ms !important; }
        }
    </style>
</head>
<body>
    <header>
        <a href="/" class="logo">Jason Plank<span class="dot">.</span></a>
        <span class="mono">Error — Page Index</span>
    </header>
    <main>
        <div class="code-row">
            <h1 aria-label="404"><span>4</span><span>0</span><span>4</span></h1>
        </div>
        <p class="quip" id="quip">This page took the wrong trail.</p>
        <p class="sub">Looks like this page doesn't exist. Maybe it moved, maybe it never was. Either way, let's get you back on track.</p>
        <div class="row">
            <a href="/" class="btn btn-solid">← Back to the site</a>
            <a href="/#trail" class="btn">▶ Or play the hidden game</a>
        </div>
    </main>
    <footer>
        <span class="mono">&copy; 2026 Jason Plank</span>
        <span class="mono">Memphis, TN — 35.14°N / 90.05°W</span>
    </footer>

    <script>
    (function () {
        // Match the edition the visitor was dealt on the main site.
        var EDITIONS = [
            { paper: '#F4F0E6', paperRgb: '244,240,230', ink: '#171410', inkRgb: '23,20,16', accent: '#FF4B11' },
            { paper: '#EEF2F5', paperRgb: '238,242,245', ink: '#101820', inkRgb: '16,24,32', accent: '#3D8BFF' },
            { paper: '#F6F1E3', paperRgb: '246,241,227', ink: '#191309', inkRgb: '25,19,9', accent: '#FFB81C' },
            { paper: '#EDF4F2', paperRgb: '237,244,242', ink: '#0E1A17', inkRgb: '14,26,23', accent: '#1FD3B5' },
            { paper: '#F2EFF6', paperRgb: '242,239,246', ink: '#16121F', inkRgb: '22,18,31', accent: '#A98CFF' },
            { paper: '#F6EFEC', paperRgb: '246,239,236', ink: '#1A1210', inkRgb: '26,18,16', accent: '#F5484C' },
            { paper: '#0B100C', paperRgb: '11,16,12', ink: '#D8F3CE', inkRgb: '216,243,206', accent: '#46FF7E' }
        ];
        var visits = parseInt(localStorage.getItem('jp_visits') || '1', 10) || 1;
        var saved = parseInt(sessionStorage.getItem('jp_ed') || '', 10);
        var i = (!isNaN(saved) && saved >= 0 && saved < 7) ? saved : (visits % 7 === 0 ? 6 : (visits - 1) % 6);
        var ed = EDITIONS[i];
        var r = document.documentElement.style;
        r.setProperty('--paper', ed.paper);
        r.setProperty('--paper-rgb', ed.paperRgb);
        r.setProperty('--ink', ed.ink);
        r.setProperty('--ink-rgb', ed.inkRgb);
        r.setProperty('--accent', ed.accent);
        r.setProperty('--on-accent', i === 6 ? ed.paper : ed.ink);

        var quips = [
            'This page took the wrong trail.',
            'You have wandered off the sitemap.',
            'Four-oh-four. Even the crawler found nothing here.',
            'Not every URL survives the journey west.'
        ];
        document.getElementById('quip').textContent = quips[Math.floor(Math.random() * quips.length)];
    })();
    </script>
</body>
</html>
